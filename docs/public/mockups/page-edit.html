<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ページ編集</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap">
<style>
  :root {
    --md-sys-color-primary: #1a73e8;
    --md-sys-color-on-primary: #ffffff;
    --md-sys-color-primary-container: #d3e3fd;
    --md-sys-color-surface: #f8f9fa;
    --md-sys-color-surface-container: #ffffff;
    --md-sys-color-surface-container-high: #f1f3f4;
    --md-sys-color-on-surface: #1f1f1f;
    --md-sys-color-on-surface-variant: #5f6368;
    --md-sys-color-outline: #dadce0;
    --md-sys-color-outline-variant: #e8eaed;
    --md-sys-color-error: #d93025;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', 'Roboto', sans-serif;
    background: var(--md-sys-color-surface);
    color: var(--md-sys-color-on-surface);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Top App Bar */
  .top-app-bar {
    background: var(--md-sys-color-surface-container);
    padding: 12px 8px;
    display: flex;
    align-items: center;
    gap: 4px;
    height: 64px;
    z-index: 10;
    border-bottom: 1px solid var(--md-sys-color-outline-variant);
  }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--md-sys-color-on-surface);
    transition: background 0.2s;
    font-family: inherit;
  }

  .icon-btn:hover { background: rgba(0,0,0,0.06); }
  .icon-btn:active { background: rgba(0,0,0,0.1); }

  .top-app-bar .title {
    font-size: 18px;
    font-weight: 500;
    flex: 1;
  }

  .done-text-btn {
    background: none;
    border: none;
    color: var(--md-sys-color-primary);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 8px;
    transition: background 0.2s;
    font-family: inherit;
  }

  .done-text-btn:hover { background: rgba(26,115,232,0.08); }
  .done-text-btn:active { background: rgba(26,115,232,0.15); }

  /* Preview Area with Swipe */
  .preview-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--md-sys-color-surface-container-high);
    overflow: hidden;
    position: relative;
    touch-action: pan-y;
  }

  .swipe-track {
    display: flex;
    align-items: center;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
    height: 100%;
  }

  .swipe-track.dragging {
    transition: none;
  }

  .swipe-page {
    flex: 0 0 100%;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .preview-container {
    width: 80%;
    max-width: 280px;
    aspect-ratio: 210/297;
    position: relative;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), filter 0.4s ease;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    border-radius: 4px;
    overflow: hidden;
  }

  .preview-page {
    width: 100%;
    height: 100%;
    background: #fefefe;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 6px;
  }

  .preview-line {
    height: 4px;
    background: #333;
    opacity: 0.6;
    border-radius: 1px;
  }

  .preview-line.heading {
    height: 7px;
    width: 55% !important;
    opacity: 0.8;
    margin-bottom: 6px;
  }

  /* Page indicator */
  .page-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 500;
    z-index: 5;
  }

  /* Action Toolbar */
  .action-toolbar {
    background: var(--md-sys-color-surface-container);
    border-top: 1px solid var(--md-sys-color-outline-variant);
    padding: 12px 16px;
    display: flex;
    justify-content: space-around;
    align-items: center;
  }

  .toolbar-action {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--md-sys-color-on-surface-variant);
    padding: 8px 12px;
    border-radius: 12px;
    transition: background 0.2s, color 0.2s;
    font-family: inherit;
    min-width: 64px;
  }

  .toolbar-action:hover {
    background: rgba(0,0,0,0.04);
    color: var(--md-sys-color-on-surface);
  }

  .toolbar-action:active {
    background: rgba(0,0,0,0.08);
    transform: scale(0.95);
  }

  .toolbar-action .material-symbols-outlined {
    font-size: 24px;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .toolbar-action span:last-child {
    font-size: 11px;
    font-weight: 500;
  }

  /* Filter Panel */
  .filter-panel {
    background: var(--md-sys-color-surface-container);
    padding: 0 0 0;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s;
  }

  .filter-panel.open {
    max-height: 180px;
    padding: 12px 0 16px;
  }

  .filter-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    margin-bottom: 12px;
  }

  .filter-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--md-sys-color-on-surface-variant);
  }

  .filter-scroll {
    display: flex;
    gap: 12px;
    padding: 0 16px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }

  .filter-scroll::-webkit-scrollbar { display: none; }

  .filter-item {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    scroll-snap-align: start;
    background: none;
    border: none;
    font-family: inherit;
  }

  .filter-preview {
    width: 64px;
    height: 80px;
    border-radius: 8px;
    background: #fefefe;
    border: 2px solid transparent;
    transition: border-color 0.2s, transform 0.15s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 6px;
    gap: 3px;
    position: relative;
  }

  .filter-item:active .filter-preview {
    transform: scale(0.95);
  }

  .filter-item.active .filter-preview {
    border-color: var(--md-sys-color-primary);
    box-shadow: 0 0 0 1px var(--md-sys-color-primary);
  }

  .filter-preview .fline {
    height: 2px;
    background: #333;
    border-radius: 1px;
    opacity: 0.5;
  }

  .filter-preview .fline:first-child {
    height: 3px;
    width: 50% !important;
    opacity: 0.7;
  }

  .filter-name {
    font-size: 11px;
    color: var(--md-sys-color-on-surface-variant);
    font-weight: 500;
    white-space: nowrap;
    transition: color 0.2s;
  }

  .filter-item.active .filter-name {
    color: var(--md-sys-color-primary);
    font-weight: 700;
  }

  /* Filter effect previews */
  .filter-preview.original {}
  .filter-preview.sharpen { filter: contrast(1.4) brightness(1.05); }
  .filter-preview.bw { filter: grayscale(1) contrast(1.3); }
  .filter-preview.whiteboard { filter: brightness(1.3) contrast(1.6) saturate(0); }
  .filter-preview.color-limit { filter: saturate(2) contrast(1.2); }
  .filter-preview.magic { filter: brightness(1.4) contrast(2) saturate(0.3); }

  /* Confirm Dialog Overlay */
  .dialog-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s ease;
  }

  .dialog-overlay.hiding {
    animation: fadeOut 0.2s ease forwards;
  }

  .dialog-box {
    background: var(--md-sys-color-surface-container);
    border-radius: 28px;
    padding: 24px;
    width: 280px;
    animation: scaleIn 0.2s ease;
  }

  .dialog-overlay.hiding .dialog-box {
    animation: scaleOut 0.15s ease forwards;
  }

  .dialog-title {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 12px;
  }

  .dialog-body {
    font-size: 14px;
    color: var(--md-sys-color-on-surface-variant);
    line-height: 1.5;
    margin-bottom: 20px;
  }

  .dialog-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  .dialog-btn {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .dialog-btn-cancel {
    color: var(--md-sys-color-on-surface-variant);
  }

  .dialog-btn-cancel:hover { background: rgba(0,0,0,0.06); }

  .dialog-btn-discard {
    color: var(--md-sys-color-error);
  }

  .dialog-btn-discard:hover { background: rgba(217,48,37,0.08); }

  .dialog-btn-confirm {
    color: var(--md-sys-color-primary);
  }

  .dialog-btn-confirm:hover { background: rgba(26,115,232,0.08); }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
  @keyframes scaleIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes scaleOut { from { transform: scale(1); opacity: 1; } to { transform: scale(0.85); opacity: 0; } }
</style>
</head>

<script>
// ============================================
// Edit State (View Model)
// ============================================
const TOTAL_PAGES = 3;
let currentPage = 0;
let filterOpen = false;

// Default filter
const DEFAULT_FILTER = 'magic';
const DEFAULT_FILTER_CSS = 'brightness(1.4) contrast(2) saturate(0.3)';

// Per-page edit state: tracks pending (unsaved) changes
const editState = Array.from({ length: TOTAL_PAGES }, () => ({
  filter: DEFAULT_FILTER,
  filterCSS: DEFAULT_FILTER_CSS,
  rotation: 0,
}));

// Saved state: what was persisted (used to detect dirty)
const savedState = Array.from({ length: TOTAL_PAGES }, () => ({
  filter: DEFAULT_FILTER,
  filterCSS: DEFAULT_FILTER_CSS,
  rotation: 0,
}));

function isDirty() {
  return editState.some((es, i) =>
    es.filter !== savedState[i].filter || es.rotation !== savedState[i].rotation
  );
}

// ============================================
// Rendering
// ============================================
function renderPage(index) {
  const el = document.getElementById(`preview-${index}`);
  if (!el) return;
  const state = editState[index];
  el.style.transform = `rotate(${state.rotation}deg)`;
  el.style.filter = state.filterCSS;
}

function renderAllPages() {
  for (let i = 0; i < TOTAL_PAGES; i++) renderPage(i);
}

function updateIndicator() {
  document.getElementById('pageIndicator').textContent = `${currentPage + 1} / ${TOTAL_PAGES}`;
}

function syncFilterSelection() {
  const state = editState[currentPage];
  document.querySelectorAll('.filter-item').forEach(fi => {
    fi.classList.toggle('active', fi.dataset.filter === state.filter);
  });
}

// ============================================
// Swipe Navigation
// ============================================
const track = document.getElementById('swipeTrack');
const area = document.getElementById('previewArea');
let startX = 0, currentX = 0, dragging = false;

function getTrackOffset() {
  return -currentPage * area.offsetWidth;
}

function setTrackPosition(offset, animate) {
  track.classList.toggle('dragging', !animate);
  track.style.transform = `translateX(${offset}px)`;
}

function goToPage(index) {
  currentPage = Math.max(0, Math.min(TOTAL_PAGES - 1, index));
  setTrackPosition(getTrackOffset(), true);
  updateIndicator();
  syncFilterSelection();
}

area.addEventListener('touchstart', (e) => {
  startX = e.touches[0].clientX;
  dragging = true;
}, { passive: true });

area.addEventListener('touchmove', (e) => {
  if (!dragging) return;
  currentX = e.touches[0].clientX;
  const diff = currentX - startX;
  setTrackPosition(getTrackOffset() + diff, false);
}, { passive: true });

area.addEventListener('touchend', () => {
  if (!dragging) return;
  dragging = false;
  const diff = currentX - startX;
  const threshold = area.offsetWidth * 0.2;
  if (diff < -threshold && currentPage < TOTAL_PAGES - 1) {
    goToPage(currentPage + 1);
  } else if (diff > threshold && currentPage > 0) {
    goToPage(currentPage - 1);
  } else {
    setTrackPosition(getTrackOffset(), true);
  }
  currentX = 0;
});

// Mouse drag for desktop preview
let mouseDown = false, mouseStartX = 0, mouseCurrentX = 0;
area.addEventListener('mousedown', (e) => {
  mouseStartX = e.clientX;
  mouseDown = true;
  e.preventDefault();
});
area.addEventListener('mousemove', (e) => {
  if (!mouseDown) return;
  mouseCurrentX = e.clientX;
  const diff = mouseCurrentX - mouseStartX;
  setTrackPosition(getTrackOffset() + diff, false);
});
area.addEventListener('mouseup', () => {
  if (!mouseDown) return;
  mouseDown = false;
  const diff = mouseCurrentX - mouseStartX;
  const threshold = area.offsetWidth * 0.2;
  if (diff < -threshold && currentPage < TOTAL_PAGES - 1) {
    goToPage(currentPage + 1);
  } else if (diff > threshold && currentPage > 0) {
    goToPage(currentPage - 1);
  } else {
    setTrackPosition(getTrackOffset(), true);
  }
  mouseCurrentX = 0;
});
area.addEventListener('mouseleave', () => {
  if (mouseDown) {
    mouseDown = false;
    setTrackPosition(getTrackOffset(), true);
  }
});

// ============================================
// Actions
// ============================================
function rotatePage() {
  editState[currentPage].rotation -= 90;
  renderPage(currentPage);

  // Animate icon
  const icon = document.querySelector('#rotateBtn .material-symbols-outlined');
  icon.style.transform = `rotate(${editState[currentPage].rotation}deg)`;
  setTimeout(() => { icon.style.transform = ''; }, 500);
}

function retakePage() {
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s ease;';
  flash.innerHTML = '<div style="background:#fff;border-radius:16px;padding:24px;text-align:center;animation:scaleIn 0.2s ease;"><span class="material-symbols-outlined" style="font-size:48px;color:#1a73e8;">photo_camera</span><p style="margin-top:8px;font-size:14px;color:#5f6368;font-family:Noto Sans JP,sans-serif;">カメラを起動中...</p></div>';
  document.body.appendChild(flash);
  setTimeout(() => {
    flash.style.animation = 'fadeOut 0.3s ease forwards';
    setTimeout(() => flash.remove(), 300);
  }, 1200);
}

function scrollToActiveFilter() {
  const scroll = document.querySelector('.filter-scroll');
  const active = scroll.querySelector('.filter-item.active');
  if (!active || !scroll) return;
  const scrollLeft = active.offsetLeft - scroll.offsetWidth / 2 + active.offsetWidth / 2;
  scroll.scrollTo({ left: scrollLeft, behavior: 'instant' });
}

function toggleFilter() {
  const panel = document.getElementById('filterPanel');
  filterOpen = !filterOpen;
  panel.classList.toggle('open', filterOpen);

  const btn = document.getElementById('filterToggle');
  btn.style.color = filterOpen ? 'var(--md-sys-color-primary)' : '';

  if (filterOpen) {
    // Wait for panel open transition to finish so layout is computed
    requestAnimationFrame(() => scrollToActiveFilter());
  }
}

function applyFilterToCurrentPage(item) {
  const filterName = item.dataset.filter;
  const filterCSS = item.dataset.css;

  document.querySelectorAll('.filter-item').forEach(fi => fi.classList.remove('active'));
  item.classList.add('active');

  editState[currentPage].filter = filterName;
  editState[currentPage].filterCSS = filterCSS;
  renderPage(currentPage);
}

function applyFilterToAllPages(item) {
  const filterName = item.dataset.filter;
  const filterCSS = item.dataset.css;

  document.querySelectorAll('.filter-item').forEach(fi => fi.classList.remove('active'));
  item.classList.add('active');

  for (let i = 0; i < TOTAL_PAGES; i++) {
    editState[i].filter = filterName;
    editState[i].filterCSS = filterCSS;
  }
  renderAllPages();
}

function showAllPagesDialog(item) {
  const filterLabel = item.querySelector('.filter-name').textContent;
  const overlay = document.createElement('div');
  overlay.className = 'dialog-overlay';
  overlay.innerHTML = `
    <div class="dialog-box">
      <div class="dialog-title">全ページに適用</div>
      <div class="dialog-body">「${filterLabel}」フィルタを全ページに適用しますか？</div>
      <div class="dialog-actions">
        <button class="dialog-btn dialog-btn-cancel" onclick="dismissDialog(this)">キャンセル</button>
        <button class="dialog-btn dialog-btn-confirm" id="confirmAllPages">適用</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('confirmAllPages').addEventListener('click', function() {
    applyFilterToAllPages(item);
    dismissDialog(this);
  });
}

// Long-press detection on filter items
const LONG_PRESS_MS = 500;

document.querySelectorAll('.filter-item').forEach(item => {
  let pressTimer = null;
  let longPressed = false;

  function startPress() {
    longPressed = false;
    pressTimer = setTimeout(() => {
      longPressed = true;
      showAllPagesDialog(item);
    }, LONG_PRESS_MS);
  }

  function endPress(e) {
    clearTimeout(pressTimer);
    if (!longPressed) {
      applyFilterToCurrentPage(item);
    }
    // Prevent click after long press
    if (longPressed && e.type === 'click') {
      e.preventDefault();
      e.stopPropagation();
    }
  }

  function cancelPress() {
    clearTimeout(pressTimer);
  }

  // Touch events
  item.addEventListener('touchstart', (e) => { startPress(); }, { passive: true });
  item.addEventListener('touchend', (e) => { endPress(e); });
  item.addEventListener('touchmove', cancelPress, { passive: true });
  item.addEventListener('touchcancel', cancelPress);

  // Mouse events (desktop)
  item.addEventListener('mousedown', (e) => { startPress(); });
  item.addEventListener('mouseup', (e) => { endPress(e); });
  item.addEventListener('mouseleave', cancelPress);
  item.addEventListener('click', (e) => {
    if (longPressed) { e.preventDefault(); e.stopPropagation(); }
  });
});

// ============================================
// Back / Apply
// ============================================
function goBack() {
  if (isDirty()) {
    showDiscardDialog();
  } else {
    animateBack();
  }
}

function showDiscardDialog() {
  const overlay = document.createElement('div');
  overlay.className = 'dialog-overlay';
  overlay.innerHTML = `
    <div class="dialog-box">
      <div class="dialog-title">編集内容を破棄しますか？</div>
      <div class="dialog-body">変更した回転やフィルタの設定は保存されません。</div>
      <div class="dialog-actions">
        <button class="dialog-btn dialog-btn-cancel" onclick="dismissDialog(this)">キャンセル</button>
        <button class="dialog-btn dialog-btn-discard" onclick="confirmDiscard(this)">破棄</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

function dismissDialog(btn) {
  const overlay = btn.closest('.dialog-overlay');
  overlay.classList.add('hiding');
  setTimeout(() => overlay.remove(), 200);
}

function confirmDiscard(btn) {
  const overlay = btn.closest('.dialog-overlay');
  overlay.classList.add('hiding');
  setTimeout(() => {
    overlay.remove();
    // Revert to saved state
    for (let i = 0; i < TOTAL_PAGES; i++) {
      Object.assign(editState[i], savedState[i]);
    }
    renderAllPages();
    animateBack();
  }, 200);
}

function animateBack() {
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.05);z-index:100;animation:fadeOut 0.3s ease forwards;';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 300);
}

function applyDone() {
  // Persist: copy editState to savedState
  for (let i = 0; i < TOTAL_PAGES; i++) {
    Object.assign(savedState[i], editState[i]);
  }

  const btn = document.querySelector('.done-text-btn');
  btn.textContent = '✓ 適用済み';
  btn.style.color = '#137333';
  setTimeout(() => {
    btn.textContent = '適用';
    btn.style.color = '';
  }, 1500);
}

// ============================================
// Init
// ============================================
goToPage(0);
renderAllPages();

// Auto-open filter panel
setTimeout(() => toggleFilter(), 800);
</script>
