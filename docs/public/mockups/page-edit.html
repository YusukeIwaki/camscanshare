<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ページ編集</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap">
<style>
  :root {
    --md-sys-color-primary: #1a73e8;
    --md-sys-color-on-primary: #ffffff;
    --md-sys-color-primary-container: #d3e3fd;
    --md-sys-color-surface: #f8f9fa;
    --md-sys-color-surface-container: #ffffff;
    --md-sys-color-surface-container-high: #f1f3f4;
    --md-sys-color-on-surface: #1f1f1f;
    --md-sys-color-on-surface-variant: #5f6368;
    --md-sys-color-outline: #dadce0;
    --md-sys-color-outline-variant: #e8eaed;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', 'Roboto', sans-serif;
    background: var(--md-sys-color-surface);
    color: var(--md-sys-color-on-surface);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Top App Bar */
  .top-app-bar {
    background: var(--md-sys-color-surface-container);
    padding: 12px 8px;
    display: flex;
    align-items: center;
    gap: 4px;
    height: 64px;
    z-index: 10;
    border-bottom: 1px solid var(--md-sys-color-outline-variant);
  }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--md-sys-color-on-surface);
    transition: background 0.2s;
    font-family: inherit;
  }

  .icon-btn:hover { background: rgba(0,0,0,0.06); }
  .icon-btn:active { background: rgba(0,0,0,0.1); }

  .top-app-bar .title {
    font-size: 18px;
    font-weight: 500;
    flex: 1;
  }

  .done-text-btn {
    background: none;
    border: none;
    color: var(--md-sys-color-primary);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 8px;
    transition: background 0.2s;
    font-family: inherit;
  }

  .done-text-btn:hover { background: rgba(26,115,232,0.08); }
  .done-text-btn:active { background: rgba(26,115,232,0.15); }

  /* Page Preview */
  .preview-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--md-sys-color-surface-container-high);
    overflow: hidden;
    position: relative;
  }

  .preview-container {
    width: 80%;
    max-width: 280px;
    aspect-ratio: 210/297;
    position: relative;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), filter 0.4s ease;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    border-radius: 4px;
    overflow: hidden;
  }

  .preview-page {
    width: 100%;
    height: 100%;
    background: #fefefe;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 6px;
  }

  .preview-line {
    height: 4px;
    background: #333;
    opacity: 0.6;
    border-radius: 1px;
  }

  .preview-line.heading {
    height: 7px;
    width: 55% !important;
    opacity: 0.8;
    margin-bottom: 6px;
  }

  /* Page indicator */
  .page-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 500;
  }

  /* Action Toolbar */
  .action-toolbar {
    background: var(--md-sys-color-surface-container);
    border-top: 1px solid var(--md-sys-color-outline-variant);
    padding: 12px 16px;
    display: flex;
    justify-content: space-around;
    align-items: center;
  }

  .toolbar-action {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--md-sys-color-on-surface-variant);
    padding: 8px 12px;
    border-radius: 12px;
    transition: background 0.2s, color 0.2s;
    font-family: inherit;
    min-width: 64px;
  }

  .toolbar-action:hover {
    background: rgba(0,0,0,0.04);
    color: var(--md-sys-color-on-surface);
  }

  .toolbar-action:active {
    background: rgba(0,0,0,0.08);
    transform: scale(0.95);
  }

  .toolbar-action .material-symbols-outlined {
    font-size: 24px;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .toolbar-action span:last-child {
    font-size: 11px;
    font-weight: 500;
  }

  /* Rotate animation on icon */
  .toolbar-action.rotating .material-symbols-outlined {
    transform: rotate(-90deg);
  }

  /* Filter Panel */
  .filter-panel {
    background: var(--md-sys-color-surface-container);
    padding: 0 0 16px;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s;
  }

  .filter-panel.open {
    max-height: 160px;
    padding: 12px 0 16px;
  }

  .filter-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--md-sys-color-on-surface-variant);
    padding: 0 16px;
    margin-bottom: 12px;
  }

  .filter-scroll {
    display: flex;
    gap: 12px;
    padding: 0 16px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }

  .filter-scroll::-webkit-scrollbar { display: none; }

  .filter-item {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    scroll-snap-align: start;
    background: none;
    border: none;
    font-family: inherit;
  }

  .filter-preview {
    width: 64px;
    height: 80px;
    border-radius: 8px;
    background: #fefefe;
    border: 2px solid transparent;
    transition: border-color 0.2s, transform 0.15s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 6px;
    gap: 3px;
    position: relative;
  }

  .filter-item:active .filter-preview {
    transform: scale(0.95);
  }

  .filter-item.active .filter-preview {
    border-color: var(--md-sys-color-primary);
    box-shadow: 0 0 0 1px var(--md-sys-color-primary);
  }

  .filter-preview .fline {
    height: 2px;
    background: #333;
    border-radius: 1px;
    opacity: 0.5;
  }

  .filter-preview .fline:first-child {
    height: 3px;
    width: 50% !important;
    opacity: 0.7;
  }

  .filter-name {
    font-size: 11px;
    color: var(--md-sys-color-on-surface-variant);
    font-weight: 500;
    white-space: nowrap;
    transition: color 0.2s;
  }

  .filter-item.active .filter-name {
    color: var(--md-sys-color-primary);
    font-weight: 700;
  }

  /* Filter effect previews */
  .filter-preview.original {}
  .filter-preview.sharpen { filter: contrast(1.4) brightness(1.05); }
  .filter-preview.bw { filter: grayscale(1) contrast(1.3); }
  .filter-preview.whiteboard { filter: brightness(1.3) contrast(1.6) saturate(0); }
  .filter-preview.color-limit { filter: saturate(2) contrast(1.2); }
  .filter-preview.stamp { filter: contrast(3) brightness(1.5) saturate(0); }
</style>
</head>
<body>

<div class="top-app-bar">
  <button class="icon-btn" onclick="goBack()">
    <span class="material-symbols-outlined">arrow_back</span>
  </button>
  <span class="title">ページ編集</span>
  <button class="done-text-btn" onclick="applyDone()">適用</button>
</div>

<div class="preview-area">
  <div class="preview-container" id="previewContainer">
    <div class="preview-page">
      <div class="preview-line heading" style="width:50%"></div>
      <div class="preview-line" style="width:92%"></div>
      <div class="preview-line" style="width:78%"></div>
      <div class="preview-line" style="width:88%"></div>
      <div class="preview-line" style="width:65%"></div>
      <div class="preview-line" style="width:85%"></div>
      <div class="preview-line" style="width:92%"></div>
      <div class="preview-line" style="width:70%"></div>
      <div class="preview-line" style="width:88%"></div>
      <div class="preview-line" style="width:75%"></div>
      <div class="preview-line" style="width:90%"></div>
      <div class="preview-line" style="width:60%"></div>
      <div class="preview-line" style="width:82%"></div>
      <div class="preview-line" style="width:88%"></div>
      <div class="preview-line" style="width:72%"></div>
    </div>
  </div>
  <div class="page-indicator">1 / 3</div>
</div>

<div class="action-toolbar">
  <button class="toolbar-action" onclick="rotatePage()" id="rotateBtn">
    <span class="material-symbols-outlined">rotate_left</span>
    <span>左90°回転</span>
  </button>
  <button class="toolbar-action" onclick="retakePage()">
    <span class="material-symbols-outlined">photo_camera</span>
    <span>撮り直し</span>
  </button>
  <button class="toolbar-action" onclick="toggleFilter()" id="filterToggle">
    <span class="material-symbols-outlined">tune</span>
    <span>フィルタ</span>
  </button>
</div>

<div class="filter-panel" id="filterPanel">
  <div class="filter-label">フィルタを選択</div>
  <div class="filter-scroll">
    <button class="filter-item active" onclick="applyFilter(this, 'original', '')">
      <div class="filter-preview original">
        <div class="fline" style="width:50%"></div>
        <div class="fline" style="width:85%"></div>
        <div class="fline" style="width:70%"></div>
        <div class="fline" style="width:90%"></div>
        <div class="fline" style="width:65%"></div>
        <div class="fline" style="width:80%"></div>
      </div>
      <span class="filter-name">オリジナル</span>
    </button>

    <button class="filter-item" onclick="applyFilter(this, 'sharpen', 'contrast(1.4) brightness(1.05)')">
      <div class="filter-preview sharpen">
        <div class="fline" style="width:50%"></div>
        <div class="fline" style="width:85%"></div>
        <div class="fline" style="width:70%"></div>
        <div class="fline" style="width:90%"></div>
        <div class="fline" style="width:65%"></div>
        <div class="fline" style="width:80%"></div>
      </div>
      <span class="filter-name">くっきり</span>
    </button>

    <button class="filter-item" onclick="applyFilter(this, 'bw', 'grayscale(1) contrast(1.3)')">
      <div class="filter-preview bw">
        <div class="fline" style="width:50%"></div>
        <div class="fline" style="width:85%"></div>
        <div class="fline" style="width:70%"></div>
        <div class="fline" style="width:90%"></div>
        <div class="fline" style="width:65%"></div>
        <div class="fline" style="width:80%"></div>
      </div>
      <span class="filter-name">白黒</span>
    </button>

    <button class="filter-item" onclick="applyFilter(this, 'whiteboard', 'brightness(1.3) contrast(1.6) saturate(0)')">
      <div class="filter-preview whiteboard">
        <div class="fline" style="width:50%"></div>
        <div class="fline" style="width:85%"></div>
        <div class="fline" style="width:70%"></div>
        <div class="fline" style="width:90%"></div>
        <div class="fline" style="width:65%"></div>
        <div class="fline" style="width:80%"></div>
      </div>
      <span class="filter-name">ホワイトボード</span>
    </button>

    <button class="filter-item" onclick="applyFilter(this, 'color-limit', 'saturate(2) contrast(1.2)')">
      <div class="filter-preview color-limit">
        <div class="fline" style="width:50%"></div>
        <div class="fline" style="width:85%"></div>
        <div class="fline" style="width:70%"></div>
        <div class="fline" style="width:90%"></div>
        <div class="fline" style="width:65%"></div>
        <div class="fline" style="width:80%"></div>
      </div>
      <span class="filter-name">鮮やか</span>
    </button>

    <button class="filter-item" onclick="applyFilter(this, 'stamp', 'contrast(3) brightness(1.5) saturate(0)')">
      <div class="filter-preview stamp">
        <div class="fline" style="width:50%"></div>
        <div class="fline" style="width:85%"></div>
        <div class="fline" style="width:70%"></div>
        <div class="fline" style="width:90%"></div>
        <div class="fline" style="width:65%"></div>
        <div class="fline" style="width:80%"></div>
      </div>
      <span class="filter-name">スタンプ</span>
    </button>
  </div>
</div>

<script>
let rotation = 0;
let filterOpen = false;

function rotatePage() {
  const preview = document.getElementById('previewContainer');
  rotation -= 90;
  preview.style.transform = `rotate(${rotation}deg)`;

  const btn = document.getElementById('rotateBtn');
  const icon = btn.querySelector('.material-symbols-outlined');
  icon.style.transform = `rotate(${rotation}deg)`;
  setTimeout(() => {
    icon.style.transform = '';
  }, 500);
}

function retakePage() {
  // Simulate camera flash
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s ease;';
  flash.innerHTML = '<div style="background:#fff;border-radius:16px;padding:24px;text-align:center;animation:scaleIn 0.2s ease;"><span class="material-symbols-outlined" style="font-size:48px;color:#1a73e8;">photo_camera</span><p style="margin-top:8px;font-size:14px;color:#5f6368;font-family:Noto Sans JP,sans-serif;">カメラを起動中...</p></div>';
  document.body.appendChild(flash);
  setTimeout(() => {
    flash.style.animation = 'fadeOut 0.3s ease forwards';
    setTimeout(() => flash.remove(), 300);
  }, 1200);
}

function toggleFilter() {
  const panel = document.getElementById('filterPanel');
  filterOpen = !filterOpen;
  panel.classList.toggle('open', filterOpen);

  const btn = document.getElementById('filterToggle');
  if (filterOpen) {
    btn.style.color = 'var(--md-sys-color-primary)';
  } else {
    btn.style.color = '';
  }
}

function applyFilter(item, name, filterCSS) {
  document.querySelectorAll('.filter-item').forEach(fi => fi.classList.remove('active'));
  item.classList.add('active');

  const preview = document.getElementById('previewContainer');
  preview.style.filter = filterCSS;
}

function goBack() {
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.05);z-index:100;animation:fadeOut 0.3s ease forwards;';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 300);
}

function applyDone() {
  const btn = document.querySelector('.done-text-btn');
  btn.textContent = '✓ 適用済み';
  btn.style.color = '#137333';
  setTimeout(() => {
    btn.textContent = '適用';
    btn.style.color = '';
  }, 1500);
}

const style = document.createElement('style');
style.textContent = `
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
  @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
`;
document.head.appendChild(style);

// Auto-open filter panel after a short delay
setTimeout(() => toggleFilter(), 800);
</script>

</body>
</html>
