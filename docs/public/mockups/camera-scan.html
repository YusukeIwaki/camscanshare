<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>カメラスキャン</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap">
<style>
  :root {
    --md-sys-color-primary: #1a73e8;
    --md-sys-color-on-primary: #ffffff;
    --md-sys-color-surface: #1a1a1a;
    --md-sys-color-on-surface: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', 'Roboto', sans-serif;
    background: #000;
    color: #fff;
    height: 100vh;
    overflow: hidden;
  }

  /* Full-screen viewfinder */
  .viewfinder {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .camera-feed {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 30%, #222 60%, #1e1e1e 100%);
    overflow: hidden;
  }

  .camera-feed::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(80,80,80,0.15) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px);
  }

  /* Simulated papers (dynamically spawned) */
  .sim-paper {
    position: absolute;
    top: 0;
    left: 0;
    background: #f5f5f0;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    will-change: transform, opacity;
  }

  .sim-paper .sim-line {
    height: 3px;
    background: #ccc;
    margin: 6% 8%;
    border-radius: 1px;
  }

  .sim-paper .sim-line:first-child {
    width: 50%;
    height: 5px;
    background: #999;
    margin-top: 10%;
  }

  #paperContainer {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  /* Paper Detection Guide */
  .detection-guide {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
  }

  .detection-rect {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 68%;
    aspect-ratio: 210/297;
    transform: translate(-50%, -50%);
    transition: top 0.5s ease, left 0.5s ease, width 0.5s ease, transform 0.5s ease;
  }

  .detection-rect .corner {
    position: absolute;
    width: 24px;
    height: 24px;
    border-color: var(--md-sys-color-primary);
    border-style: solid;
    border-width: 0;
  }

  .corner.tl { top: 0; left: 0; border-top-width: 3px; border-left-width: 3px; border-top-left-radius: 4px; }
  .corner.tr { top: 0; right: 0; border-top-width: 3px; border-right-width: 3px; border-top-right-radius: 4px; }
  .corner.bl { bottom: 0; left: 0; border-bottom-width: 3px; border-left-width: 3px; border-bottom-left-radius: 4px; }
  .corner.br { bottom: 0; right: 0; border-bottom-width: 3px; border-right-width: 3px; border-bottom-right-radius: 4px; }

  .detection-rect .edge {
    position: absolute;
    background: var(--md-sys-color-primary);
    opacity: 0.4;
  }

  .edge.top { top: 0; left: 24px; right: 24px; height: 2px; }
  .edge.bottom { bottom: 0; left: 24px; right: 24px; height: 2px; }
  .edge.left { top: 24px; bottom: 24px; left: 0; width: 2px; }
  .edge.right { top: 24px; bottom: 24px; right: 0; width: 2px; }

  .detection-rect .fill {
    position: absolute;
    inset: 0;
    background: rgba(26, 115, 232, 0.06);
    border-radius: 2px;
    animation: fill-pulse 2s ease-in-out infinite;
  }

  @keyframes fill-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .detection-guide.hidden .detection-rect { opacity: 0; }
  .detection-guide.hidden .detection-rect .corner,
  .detection-guide.hidden .detection-rect .edge,
  .detection-guide.hidden .detection-rect .fill { opacity: 0; }
  .detection-guide.visible .detection-rect { opacity: 1; }
  .detection-guide .detection-rect .corner,
  .detection-guide .detection-rect .edge,
  .detection-guide .detection-rect .fill { transition: opacity 0.3s ease; }

  /* Bottom Controls - overlay on viewfinder */
  .bottom-controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 24px;
    padding-bottom: max(20px, env(safe-area-inset-bottom, 20px));
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
  }

  .capture-row {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    position: relative;
  }

  /* Left area: back button or thumbnail stack */
  .left-action {
    position: absolute;
    left: 0;
    width: 52px;
    height: 52px;
    cursor: pointer;
  }

  .back-circle {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    border: 1.5px solid rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
  }

  .back-circle:hover {
    background: rgba(255,255,255,0.25);
  }

  .back-circle .material-symbols-outlined {
    font-size: 24px;
    color: #fff;
  }

  /* Thumbnail stack */
  .thumb-stack {
    width: 52px;
    height: 52px;
    position: relative;
    border-radius: 12px;
    overflow: visible;
    cursor: pointer;
    display: none;
  }

  .thumb-stack.has-pages {
    display: block;
  }

  .thumb-item {
    position: absolute;
    width: 52px;
    height: 52px;
    border-radius: 12px;
    background: #f5f5f0;
    border: 2px solid rgba(255,255,255,0.8);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .thumb-item .material-symbols-outlined {
    font-size: 22px;
    color: #999;
  }

  .thumb-stack .page-badge {
    position: absolute;
    top: -6px;
    right: -6px;
    min-width: 20px;
    height: 20px;
    border-radius: 10px;
    background: var(--md-sys-color-primary);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 5px;
    z-index: 10;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  /* Capture button */
  .capture-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: transparent;
    border: 4px solid #fff;
    cursor: pointer;
    transition: transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .capture-btn:active {
    transform: scale(0.92);
  }

  .capture-btn-inner {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: #fff;
    transition: background 0.15s, transform 0.15s;
  }

  .capture-btn:hover .capture-btn-inner {
    background: #e0e0e0;
  }

  .capture-btn:active .capture-btn-inner {
    transform: scale(0.9);
    background: #ccc;
  }

  /* Flash effect */
  .flash-overlay {
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
  }

  .flash-overlay.active {
    animation: flash-effect 0.4s ease-out;
  }

  @keyframes flash-effect {
    0% { opacity: 0.9; }
    100% { opacity: 0; }
  }

  /* Captured page flying to stack animation */
  .flying-page {
    position: fixed;
    width: 60%;
    aspect-ratio: 210/297;
    background: #f5f5f0;
    border: 2px solid #fff;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 90;
    pointer-events: none;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .flying-page .fly-lines {
    padding: 8px;
  }

  .flying-page .fly-line {
    height: 2px;
    background: #ccc;
    margin: 4px 0;
    border-radius: 1px;
  }

  /* fly-to-stack destination set dynamically via JS */

  @keyframes count-bump {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>

<div class="viewfinder">
  <div class="camera-feed"></div>

  <div id="paperContainer"></div>

  <div class="detection-guide hidden" id="detectionGuide">
    <div class="detection-rect" id="detectionRect">
      <div class="fill"></div>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="edge top"></div>
      <div class="edge bottom"></div>
      <div class="edge left"></div>
      <div class="edge right"></div>
    </div>
  </div>
</div>

<div class="bottom-controls">
  <div class="capture-row">
    <div class="left-action" id="leftAction" onclick="leftActionTap()">
      <div class="back-circle" id="backCircle">
        <span class="material-symbols-outlined">close</span>
      </div>
      <div class="thumb-stack" id="thumbStack" onclick="event.stopPropagation(); thumbTap()">
        <span class="page-badge" id="pageBadge">0</span>
      </div>
    </div>

    <button class="capture-btn" onclick="capture()">
      <div class="capture-btn-inner"></div>
    </button>

    <!-- Right side spacer for centering -->
    <div style="position:absolute;right:0;width:52px;height:52px;"></div>
  </div>
</div>

<div class="flash-overlay" id="flashOverlay"></div>

<script>
let pageCount = 0;
const papers = [];
const container = document.getElementById('paperContainer');
const detectionGuide = document.getElementById('detectionGuide');
const detectionRect = document.getElementById('detectionRect');
const backCircle = document.getElementById('backCircle');
const thumbStack = document.getElementById('thumbStack');
const pageBadge = document.getElementById('pageBadge');

// ---- Left action ----

function leftActionTap() {
  if (pageCount === 0) {
    // Navigate back to document list
    console.log('→ 文書一覧画面へ戻る');
  }
}

function thumbTap() {
  if (pageCount > 0) {
    // Navigate to page list
    console.log('→ ページ一覧画面へ遷移');
  }
}

function updateLeftAction() {
  if (pageCount === 0) {
    backCircle.style.display = 'flex';
    thumbStack.classList.remove('has-pages');
  } else {
    backCircle.style.display = 'none';
    thumbStack.classList.add('has-pages');
  }
}

// ---- Paper Spawning ----

const docTypes = [
  { lines: [50, 85, 70, 90, 65, 80, 75, 88], titleWeight: true, color: '#f5f5f0' },
  { lines: [40, 60, 90, 55, 80, 70], titleWeight: true, color: '#f8f6ee' },
  { lines: [90, 90, 90, 90, 90, 90, 90], titleWeight: false, color: '#eef2f7' },
  { lines: [45, 75, 30, 85, 60], titleWeight: true, color: '#fff8f0' },
];

function createPaperEl(docType) {
  const el = document.createElement('div');
  el.className = 'sim-paper';
  el.style.background = docType.color;

  docType.lines.forEach((w, i) => {
    const line = document.createElement('div');
    line.className = 'sim-line';
    line.style.width = w + '%';
    if (i === 0 && docType.titleWeight) {
      line.style.height = '5px';
      line.style.background = '#999';
      line.style.width = '50%';
    }
    el.appendChild(line);
  });
  return el;
}

function spawnPaper() {
  const viewfinder = document.querySelector('.viewfinder');
  const vw = viewfinder.offsetWidth;
  const vh = viewfinder.offsetHeight;

  const docType = docTypes[Math.floor(Math.random() * docTypes.length)];
  const el = createPaperEl(docType);

  const paperW = vw * (0.50 + Math.random() * 0.20);
  const paperH = paperW * (297 / 210);
  el.style.width = paperW + 'px';
  el.style.height = paperH + 'px';

  const scenario = Math.floor(Math.random() * 5);
  let startX, startY, endX, endY, startRot, endRot, duration;

  switch (scenario) {
    case 0:
      startX = -paperW;
      startY = vh * (0.3 + Math.random() * 0.3);
      endX = vw + paperW;
      endY = startY + (Math.random() - 0.5) * vh * 0.3;
      startRot = -15 + Math.random() * 10;
      endRot = startRot + (Math.random() - 0.5) * 20;
      duration = 5000 + Math.random() * 3000;
      break;
    case 1:
      startX = vw * (0.2 + Math.random() * 0.5);
      startY = -paperH;
      endX = startX + (Math.random() - 0.5) * vw * 0.4;
      endY = vh + paperH;
      startRot = -10 + Math.random() * 20;
      endRot = startRot + (Math.random() - 0.5) * 15;
      duration = 5000 + Math.random() * 3000;
      break;
    case 2:
      startX = vw * (0.25 + Math.random() * 0.2);
      startY = vh * (0.2 + Math.random() * 0.2);
      endX = startX + (Math.random() > 0.5 ? 1 : -1) * (vw * 0.5 + paperW);
      endY = startY + (Math.random() - 0.5) * vh * 0.5;
      startRot = -5 + Math.random() * 10;
      endRot = startRot + (Math.random() - 0.5) * 30;
      duration = 6000 + Math.random() * 3000;
      break;
    case 3:
      startX = vw + paperW;
      startY = vh * (0.2 + Math.random() * 0.4);
      endX = -paperW;
      endY = startY + (Math.random() - 0.5) * vh * 0.3;
      startRot = 5 + Math.random() * 10;
      endRot = startRot - (Math.random() * 20);
      duration = 5000 + Math.random() * 3000;
      break;
    case 4:
      startX = vw * (0.1 + Math.random() * 0.5);
      startY = vh + paperH;
      endX = startX + (Math.random() - 0.5) * vw * 0.3;
      endY = -paperH;
      startRot = Math.random() * 15;
      endRot = startRot + (Math.random() - 0.5) * 20;
      duration = 5000 + Math.random() * 3000;
      break;
  }

  const tiltX = 2 + Math.random() * 6;
  const tiltY = -3 + Math.random() * 6;

  el.style.opacity = '0';
  container.appendChild(el);

  const paper = {
    el, startX, startY, endX, endY, startRot, endRot,
    tiltX, tiltY, duration,
    startTime: performance.now(),
    paperW, paperH
  };
  papers.push(paper);
  return paper;
}

// ---- Animation Loop ----

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function lerp(a, b, t) { return a + (b - a) * t; }

function updatePapers(now) {
  const viewfinder = document.querySelector('.viewfinder');
  const vw = viewfinder.offsetWidth;
  const vh = viewfinder.offsetHeight;
  const centerX = vw / 2;
  const centerY = vh / 2;

  let bestPaper = null;
  let bestDist = Infinity;

  for (let i = papers.length - 1; i >= 0; i--) {
    const p = papers[i];
    const elapsed = now - p.startTime;
    const t = Math.min(elapsed / p.duration, 1);
    const et = easeInOutCubic(t);

    const x = lerp(p.startX, p.endX, et);
    const y = lerp(p.startY, p.endY, et);
    const rot = lerp(p.startRot, p.endRot, et);

    let opacity = 1;
    if (t < 0.08) opacity = t / 0.08;
    else if (t > 0.92) opacity = (1 - t) / 0.08;

    p.el.style.transform = `translate(${x}px, ${y}px) perspective(600px) rotateX(${p.tiltX}deg) rotateY(${p.tiltY}deg) rotate(${rot}deg)`;
    p.el.style.opacity = opacity;

    p.cx = x + p.paperW / 2;
    p.cy = y + p.paperH / 2;

    const dist = Math.hypot(p.cx - centerX, p.cy - centerY);
    const inBounds = x > -p.paperW * 0.3 && x < vw - p.paperW * 0.3
                  && y > -p.paperH * 0.3 && y < vh - p.paperH * 0.3;
    if (inBounds && dist < bestDist && opacity > 0.5) {
      bestDist = dist;
      bestPaper = p;
    }

    if (t >= 1) {
      p.el.remove();
      papers.splice(i, 1);
    }
  }

  const detectThreshold = Math.min(vw, vh) * 0.45;

  if (bestPaper && bestDist < detectThreshold) {
    detectionGuide.classList.remove('hidden');
    detectionGuide.classList.add('visible');

    const rect = detectionRect;
    rect.style.width = (bestPaper.paperW + 16) + 'px';
    rect.style.aspectRatio = '210/297';
    rect.style.top = bestPaper.cy + 'px';
    rect.style.left = bestPaper.cx + 'px';
    rect.style.transform = `translate(-50%, -50%) rotate(${lerp(bestPaper.startRot, bestPaper.endRot, easeInOutCubic(Math.min((now - bestPaper.startTime) / bestPaper.duration, 1)))}deg)`;
  } else {
    detectionGuide.classList.remove('visible');
    detectionGuide.classList.add('hidden');
  }

  requestAnimationFrame(updatePapers);
}

// ---- Spawn Timer ----
function scheduleSpawn() {
  spawnPaper();
  const delay = 2000 + Math.random() * 2000;
  setTimeout(scheduleSpawn, delay);
}

spawnPaper();
setTimeout(scheduleSpawn, 1500);
requestAnimationFrame(updatePapers);

// ---- Capture ----

function capture() {
  const flash = document.getElementById('flashOverlay');
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 400);

  pageCount++;
  pageBadge.textContent = pageCount;
  pageBadge.style.animation = 'none';
  pageBadge.offsetHeight; // reflow
  pageBadge.style.animation = 'count-bump 0.3s ease';

  updateLeftAction();

  // Compute fly destination: the thumb-stack position
  const stackRect = thumbStack.getBoundingClientRect();
  const destX = stackRect.left + stackRect.width / 2;
  const destY = stackRect.top + stackRect.height / 2;

  // Random line widths for the captured "document"
  const capturedLines = [50, 85, 70, 90, 60].map(w => w + Math.floor((Math.random() - 0.5) * 10));

  // Flying page animation
  const flyPage = document.createElement('div');
  flyPage.className = 'flying-page';
  flyPage.innerHTML = `<div class="fly-lines">
    <div class="fly-line" style="width:${capturedLines[0]}%;height:3px;background:#999"></div>
    <div class="fly-line" style="width:${capturedLines[1]}%"></div>
    <div class="fly-line" style="width:${capturedLines[2]}%"></div>
    <div class="fly-line" style="width:${capturedLines[3]}%"></div>
    <div class="fly-line" style="width:${capturedLines[4]}%"></div>
  </div>`;

  // Set dynamic animation destination
  const anim = flyPage.animate([
    { top: '50%', left: '50%', transform: 'translate(-50%, -50%) scale(1)', opacity: 0.9 },
    { top: destY + 'px', left: destX + 'px', transform: 'translate(-50%, -50%) scale(0.12) rotate(-5deg)', opacity: 0 }
  ], { duration: 600, easing: 'cubic-bezier(0.4, 0, 0.2, 1)', fill: 'forwards' });

  document.body.appendChild(flyPage);
  anim.onfinish = () => flyPage.remove();

  // Add thumbnail to stack — show the latest captured page's appearance
  const thumb = document.createElement('div');
  thumb.className = 'thumb-item';
  // Render mini document lines as the thumbnail content
  thumb.innerHTML = `<div style="width:100%;height:100%;padding:6px;overflow:hidden;">
    ${capturedLines.map((w, i) =>
      `<div style="height:2px;background:${i === 0 ? '#999' : '#ccc'};margin:2px 0;width:${w}%;border-radius:1px;"></div>`
    ).join('')}
  </div>`;
  const rotation = (Math.random() - 0.5) * 10;
  thumb.style.transform = `rotate(${rotation}deg)`;
  thumb.style.zIndex = pageCount;
  thumbStack.appendChild(thumb);

  const thumbs = thumbStack.querySelectorAll('.thumb-item');
  if (thumbs.length > 3) {
    thumbs[0].remove();
  }
}

// Init
updateLeftAction();
</script>

</body>
</html>
