name: CamScanShare
options:
  bundleIdPrefix: io.github.yusukeiwaki
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

targets:
  CamScanShare:
    type: application
    platform: iOS
    sources:
      - CamScanShare
    settings:
      base:
        INFOPLIST_FILE: CamScanShare/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: io.github.yusukeiwaki.camscanshare
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_STRICT_CONCURRENCY: complete
